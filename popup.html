<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Hand Navigation</title>
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-dot"></span>
      <h1>Hand Navigation</h1>
    </div>
    <p class="sub">Naviga con i gesti della mano</p>
  </header>

  <div id="status" class="status">Pronto.</div>

  <button id="cameraBtn" class="btn btn-secondary">🎥 Consenti fotocamera</button>
  <button id="toggleBtn" class="btn btn-primary">▶︎ Avvia</button>

  <details class="settings">
    <summary>⚙︎ Sensibilità</summary>

    <label>
      Velocità cursore <output id="cursorGainOut"></output>
      <input type="range" id="cursorGain" min="1" max="3" step="0.1" />
    </label>

    <label>
      Fluidità (smoothing) <output id="smoothingOut"></output>
      <input type="range" id="smoothing" min="0" max="0.9" step="0.05" />
    </label>

    <label>
      Velocità scroll <output id="scrollSpeedOut"></output>
      <input type="range" id="scrollSpeed" min="0.5" max="3" step="0.1" />
    </label>

    <label>
      Sensibilità pinch (click) <output id="pinchThresholdOut"></output>
      <input type="range" id="pinchThreshold" min="0.2" max="0.5" step="0.02" />
    </label>

    <label>
      Sensibilità pinch (tasto destro) <output id="rightPinchThresholdOut"></output>
      <input type="range" id="rightPinchThreshold" min="0.2" max="0.5" step="0.02" />
    </label>

    <label class="checkbox">
      <input type="checkbox" id="invertScroll" />
      Inverti direzione scroll
    </label>
  </details>

  <div class="legend">
    <div><span>☝︎</span> Indice = muovi il cursore</div>
    <div><span>🤏</span> Pinch (pollice+indice) = click</div>
    <div><span>🖱</span> Pinch (pollice+medio) = tasto destro</div>
    <div><span>✋</span> Mano aperta = scroll (su/giù)</div>
    <div><span>✊</span> Pugno = pausa</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
