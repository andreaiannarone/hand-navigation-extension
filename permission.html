<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hand Navigation — Permesso fotocamera</title>
  <style>
    /* Sci-fi "Iron Man" HUD design system — see DESIGN.md */
    @font-face {
      font-family: 'Play'; font-style: normal; font-weight: 400; font-display: swap;
      src: url('vendor/fonts/play-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Play'; font-style: normal; font-weight: 700; font-display: swap;
      src: url('vendor/fonts/play-700.woff2') format('woff2');
    }
    :root {
      --bg: #09090b; --text: #e4e4e7; --muted: #a1a1aa;
      --accent: #3b82f6; --accent-light: #60a5fa; --accent-hud: #58a6ff;
      --border: rgba(255, 255, 255, 0.1);
      --font: 'Play', ui-monospace, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      font-family: var(--font); color: var(--text);
      background:
        radial-gradient(90% 60% at 50% -10%, rgba(59, 130, 246, 0.18), transparent 60%),
        var(--bg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; padding: 24px;
    }
    .card {
      position: relative;
      max-width: 460px; text-align: center;
      background: rgba(24, 24, 27, 0.9);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(63, 63, 70, 0.5);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      padding: 36px 32px;
      overflow: hidden;
    }
    /* HUD line at the top of the card */
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-hud), transparent);
    }
    .brand {
      display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .brand-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 8px rgba(59, 130, 246, 0.8);
    }
    .brand-label {
      font-size: 9px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.24em;
    }
    h1 {
      font-size: 17px; margin: 0 0 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    p {
      color: var(--muted); font-size: 13px; line-height: 1.7;
    }
    p strong { color: var(--accent-light); }
    #msg {
      margin-top: 18px; font-weight: 700; min-height: 20px;
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    #msg.ok { color: var(--accent-light); }
    #msg.err { color: #fca5a5; }
    button {
      margin-top: 20px; padding: 13px 26px;
      border: 1px solid transparent; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff; font-family: var(--font); font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.14em; cursor: pointer;
      box-shadow: 0 0 18px rgba(59, 130, 246, 0.35);
      transition: all 0.2s;
    }
    button:hover { background: linear-gradient(135deg, var(--accent-light), #6366f1); }
    video {
      margin-top: 20px; width: 240px; border-radius: 12px;
      background: #000; display: none;
      border: 1px solid var(--border); transform: scaleX(-1);
    }
    .hint {
      font-size: 10px; color: var(--muted); margin-top: 20px;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-label">Hand Navigation</span>
    </div>
    <h1>🎥 Consenti la fotocamera</h1>
    <p>Hand Navigation usa la webcam per riconoscere i gesti della mano.
       Clicca il pulsante e conferma <strong>“Consenti”</strong> nel prompt di Chrome.</p>
    <button id="grant">Consenti fotocamera</button>
    <video id="preview" autoplay playsinline muted></video>
    <div id="msg"></div>
    <p class="hint">Se non compare alcun prompt: controlla <em>Impostazioni di sistema → Privacy → Fotocamera → Google Chrome</em>, poi riprova.</p>
  </div>
  <script src="permission.js"></script>
</body>
</html>
